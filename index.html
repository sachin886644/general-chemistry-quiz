<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Chemistry Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Home Screen -->
        <div id="home-screen" class="screen active">
            <div class="hero">
                <div class="hero-icon">⚗️</div>
                <h1>General Chemistry Quiz</h1>
                <p class="subtitle">Test your knowledge across key chemistry topics</p>
            </div>
            <div class="topic-grid" id="topic-grid"></div>
            <div class="start-section">
                <div class="quiz-options">
                    <label>Questions per quiz:
                        <select id="question-count">
                            <option value="5">5 Questions</option>
                            <option value="10" selected>10 Questions</option>
                            <option value="15">15 Questions</option>
                            <option value="20">20 Questions</option>
                        </select>
                    </label>
                    <label>Difficulty:
                        <select id="difficulty">
                            <option value="all" selected>All Levels</option>
                            <option value="easy">Easy</option>
                            <option value="medium">Medium</option>
                            <option value="hard">Hard</option>
                        </select>
                    </label>
                </div>
                <button class="btn-primary btn-large" id="start-quiz-btn">Start Quiz 🚀</button>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="screen">
            <div class="quiz-header">
                <div class="quiz-meta">
                    <span class="topic-badge" id="current-topic-badge">Topic</span>
                    <span class="difficulty-badge" id="current-difficulty-badge">Medium</span>
                </div>
                <div class="progress-info">
                    <span id="question-counter">1 / 10</span>
                    <div class="timer" id="timer">
                        <span class="timer-icon">⏱️</span>
                        <span id="timer-display">30</span>s
                    </div>
                </div>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="question-card" id="question-card">
                <div class="score-display">Score: <span id="current-score">0</span></div>
                <h2 id="question-text" class="question-text"></h2>
                <div class="options-grid" id="options-container"></div>
                <div class="feedback" id="feedback"></div>
                <button class="btn-primary" id="next-btn" style="display:none">Next Question →</button>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="results-screen" class="screen">
            <div class="results-card">
                <div class="results-emoji" id="results-emoji">🎉</div>
                <h2>Quiz Complete!</h2>
                <div class="score-summary">
                    <div class="score-circle">
                        <span class="score-percent" id="score-percent">0%</span>
                        <span class="score-label">Score</span>
                    </div>
                </div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-value" id="stat-correct">0</span>
                        <span class="stat-label">✅ Correct</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="stat-wrong">0</span>
                        <span class="stat-label">❌ Wrong</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="stat-time">0s</span>
                        <span class="stat-label">⏱️ Avg Time</span>
                    </div>
                </div>
                <div class="performance-msg" id="performance-msg"></div>
                <div class="results-actions">
                    <button class="btn-primary" id="retry-btn">Try Again 🔄</button>
                    <button class="btn-secondary" id="home-btn">Home 🏠</button>
                </div>
            </div>
        </div>
    </div>
    <script src="quiz.js"></script>
</body>
</html>
